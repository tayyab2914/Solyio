  <circle cx="568" cy="178" r="52" fill="none" stroke="#10B981" stroke-width="10" stroke-dasharray="262 327" stroke-linecap="round" transform="rotate(-90 568 178)"/>
  <circle cx="568" cy="178" r="40" fill="none" stroke="#1A2A1A" stroke-width="8"/>
  <circle cx="568" cy="178" r="40" fill="none" stroke="#3B82F6" stroke-width="8" stroke-dasharray="188 251" stroke-linecap="round" transform="rotate(-90 568 178)"/>
  <circle cx="568" cy="178" r="28" fill="none" stroke="#111A11" stroke-width="6"/>
  <circle cx="568" cy="178" r="28" fill="none" stroke="#F59E0B" stroke-width="6" stroke-dasharray="106 176" stroke-linecap="round" transform="rotate(-90 568 178)"/>
