  <rect x="170" y="245" width="110" height="34" rx="17" fill="#1A2A1A"/>
  <text x="225" y="267" fill="#6EE7B7" font-size="12" font-weight="600" text-anchor="middle">8-mo Growth</text>
  <rect x="290" y="245" width="100" height="34" rx="17" fill="#1A2A1A"/>
  <text x="340" y="267" fill="#6EE7B7" font-size="12" font-weight="600" text-anchor="middle">4.8★ App Store</text>

