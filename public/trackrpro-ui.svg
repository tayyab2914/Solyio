  <text x="508" y="418" fill="#10B981" font-size="9" text-anchor="middle">⊞</text>
  <text x="540" y="418" fill="#374151" font-size="9" text-anchor="middle">📊</text>
  <text x="572" y="418" fill="#374151" font-size="9" text-anchor="middle">🥗</text>
  <text x="604" y="418" fill="#374151" font-size="9" text-anchor="middle">👤</text>

  <!-- Second phone (partial) -->
  <rect x="390" y="60" width="90" height="180" rx="16" fill="#111A11" stroke="#1E3A1E" stroke-width="1" opacity="0.8"/>
  <rect x="396" y="80" width="78" height="152" rx="6" fill="#0D150D" opacity="0.9"/>
  <text x="435" y="104" fill="#10B981" font-size="7" text-anchor="middle" font-weight="700">SUBSCRIPTION</text>
  <rect x="403" y="110" width="64" height="30" rx="8" fill="#1A2A1A" opacity="0.8"/>
  <text x="435" y="124" fill="white" font-size="7" text-anchor="middle" font-weight="700">PRO</text>
  <text x="435" y="136" fill="#10B981" font-size="8" text-anchor="middle" font-weight="900">$9.99/mo</text>
  <rect x="403" y="148" width="64" height="14" rx="7" fill="#10B981" opacity="0.6"/>
  <text x="435" y="158" fill="white" font-size="6" text-anchor="middle">Free 7-day Trial</text>
  <text x="435" y="178" fill="#6B7280" font-size="6" text-anchor="middle">Billed via StoreKit 2</text>
  <text x="435" y="190" fill="#6B7280" font-size="6" text-anchor="middle">Stripe fallback web</text>
  <text x="435" y="214" fill="#4B5563" font-size="6" text-anchor="middle">Cancel anytime</text>
  <text x="435" y="226" fill="#4B5563" font-size="6" text-anchor="middle">40,000 subscribers</text>

  <!-- Bottom label -->
  <text x="60" y="460" fill="#1E3A1E" font-size="11">SOLYIO · iOS SWIFT · STRIPE BILLING · STOREKIT 2 · FREE TRIAL</text>
</svg>
