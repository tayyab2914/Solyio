  <!-- Workout 2 -->
  <rect x="484" y="320" width="168" height="28" rx="8" fill="#1A2A1A"/>
  <text x="496" y="337" fill="#3B82F6" font-size="10">🏃</text>
  <text x="512" y="333" fill="white" font-size="9" font-weight="600">Incline Run</text>
  <text x="512" y="344" fill="#4B5563" font-size="7">20 min · 6.5 km/h</text>
  <text x="644" y="337" fill="#F59E0B" font-size="8" font-weight="700" text-anchor="end">In Progress</text>

  <!-- Workout 3 -->
  <rect x="484" y="354" width="168" height="28" rx="8" fill="#152015"/>
  <text x="496" y="371" fill="#6B7280" font-size="10">🧘</text>
  <text x="512" y="367" fill="#6B7280" font-size="9" font-weight="600">Cool Down</text>
  <text x="512" y="378" fill="#374151" font-size="7">10 min · stretching</text>
  <text x="644" y="371" fill="#374151" font-size="8" font-weight="700" text-anchor="end">Upcoming</text>

