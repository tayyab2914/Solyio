  <text x="60" y="172" fill="white" font-size="36" font-weight="800" letter-spacing="-1">Track <tspan fill="#10B981">Everything.</tspan></text>
  <text x="60" y="215" fill="#6B7280" font-size="13" font-weight="400">iOS · Swift · Stripe · StoreKit 2</text>

  <!-- Stat pills -->
