<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 500" font-family="system-ui,-apple-system,sans-serif">
  <!-- Background -->
  <rect width="800" height="500" fill="#0B0F1A"/>
  <!-- Gradient orb -->
  <radialGradient id="orb1" cx="20%" cy="40%" r="50%">
    <stop offset="0%" stop-color="#FF1E41" stop-opacity="0.2"/>
    <stop offset="100%" stop-color="#0B0F1A" stop-opacity="0"/>
  </radialGradient>
  <rect width="800" height="500" fill="url(#orb1)"/>

  <!-- Left: Branding -->
  <text x="60" y="80" fill="#FF1E41" font-size="11" font-weight="700" letter-spacing="3" opacity="0.9">NOVAPAY · FINTECH</text>
  <text x="60" y="130" fill="white" font-size="36" font-weight="800" letter-spacing="-1">Your Money,</text>
  <text x="60" y="172" fill="white" font-size="36" font-weight="800" letter-spacing="-1">Moving <tspan fill="#FF1E41">Faster.</tspan></text>
  <text x="60" y="215" fill="#8899AA" font-size="13" font-weight="400">React Native · Stripe · iOS · Android</text>

  <!-- Stat pills -->
  <rect x="60" y="245" width="110" height="34" rx="17" fill="#FF1E41" opacity="0.15"/>
  <text x="115" y="267" fill="#FF1E41" font-size="12" font-weight="700" text-anchor="middle">+220% Volume</text>
  <rect x="182" y="245" width="100" height="34" rx="17" fill="#1E2A3A"/>
  <text x="232" y="267" fill="#8899AA" font-size="12" font-weight="600" text-anchor="middle">50k+ Users</text>
  <rect x="294" y="245" width="96" height="34" rx="17" fill="#1E2A3A"/>
  <text x="342" y="267" fill="#8899AA" font-size="12" font-weight="600" text-anchor="middle">$3.2M GMV</text>

  <!-- Phone mockup -->
  <rect x="468" y="20" width="200" height="410" rx="32" fill="#1A1F2E" stroke="#2A3448" stroke-width="2"/>
  <!-- Notch -->
  <rect x="530" y="20" width="76" height="24" rx="12" fill="#0B0F1A"/>
  <!-- Screen -->
  <rect x="476" y="50" width="184" height="372" rx="8" fill="#111827"/>

  <!-- Status bar -->
  <text x="490" y="70" fill="white" font-size="9" font-weight="600">9:41</text>
  <rect x="628" y="62" width="24" height="10" rx="2" fill="#374151"/>
  <rect x="629" y="63" width="18" height="8" rx="1" fill="#10B981"/>

  <!-- Header -->
  <text x="490" y="96" fill="#6B7280" font-size="9">Good morning,</text>
  <text x="490" y="110" fill="white" font-size="12" font-weight="700">Alex Johnson</text>
  <circle cx="646" cy="100" r="14" fill="#1E2A3A"/>
  <text x="646" y="105" fill="#FF1E41" font-size="12" text-anchor="middle">🔔</text>

  <!-- Balance card -->
  <rect x="484" y="122" width="168" height="80" rx="14" fill="url(#cardGrad)"/>
  <linearGradient id="cardGrad" x1="0%" y1="0%" x2="100%" y2="100%">
    <stop offset="0%" stop-color="#FF1E41"/>
    <stop offset="100%" stop-color="#7C1429"/>
  </linearGradient>
  <text x="496" y="142" fill="rgba(255,255,255,0.7)" font-size="8">Total Balance</text>
  <text x="496" y="162" fill="white" font-size="18" font-weight="800">$24,580.00</text>
  <text x="496" y="178" fill="rgba(255,255,255,0.6)" font-size="7">●●●● ●●●● ●●●● 4821</text>
  <text x="620" y="195" fill="rgba(255,255,255,0.5)" font-size="7" text-anchor="end">VISA</text>

  <!-- Quick actions -->
  <rect x="484" y="212" width="36" height="36" rx="10" fill="#1E2A3A"/>
  <text x="502" y="235" fill="#FF1E41" font-size="14" text-anchor="middle">↑</text>
  <text x="502" y="258" fill="#6B7280" font-size="7" text-anchor="middle">Send</text>
  <rect x="528" y="212" width="36" height="36" rx="10" fill="#1E2A3A"/>
  <text x="546" y="235" fill="#10B981" font-size="14" text-anchor="middle">↓</text>
  <text x="546" y="258" fill="#6B7280" font-size="7" text-anchor="middle">Receive</text>
  <rect x="572" y="212" width="36" height="36" rx="10" fill="#1E2A3A"/>
  <text x="590" y="235" fill="#3B82F6" font-size="14" text-anchor="middle">⊕</text>
  <text x="590" y="258" fill="#6B7280" font-size="7" text-anchor="middle">Top Up</text>
  <rect x="616" y="212" width="36" height="36" rx="10" fill="#1E2A3A"/>
  <text x="634" y="235" fill="#F59E0B" font-size="14" text-anchor="middle">⋯</text>
  <text x="634" y="258" fill="#6B7280" font-size="7" text-anchor="middle">More</text>

  <!-- Transactions label -->
  <text x="490" y="278" fill="white" font-size="10" font-weight="700">Recent Activity</text>

  <!-- Transaction 1 -->
  <circle cx="500" cy="300" r="10" fill="#FF1E41" opacity="0.15"/>
  <text x="500" y="304" fill="#FF1E41" font-size="10" text-anchor="middle">🛒</text>
  <text x="517" y="298" fill="white" font-size="9" font-weight="600">Amazon</text>
  <text x="517" y="309" fill="#6B7280" font-size="7">Today, 2:30 PM</text>
  <text x="652" y="304" fill="#FF1E41" font-size="9" font-weight="700" text-anchor="end">−$89.99</text>

  <!-- Transaction 2 -->
  <circle cx="500" cy="325" r="10" fill="#10B981" opacity="0.15"/>
  <text x="500" y="329" fill="#10B981" font-size="10" text-anchor="middle">💰</text>
  <text x="517" y="323" fill="white" font-size="9" font-weight="600">Salary</text>
  <text x="517" y="334" fill="#6B7280" font-size="7">Yesterday</text>
  <text x="652" y="329" fill="#10B981" font-size="9" font-weight="700" text-anchor="end">+$4,200</text>

  <!-- Transaction 3 -->
  <circle cx="500" cy="350" r="10" fill="#3B82F6" opacity="0.15"/>
  <text x="500" y="354" fill="#3B82F6" font-size="10" text-anchor="middle">☕</text>
  <text x="517" y="348" fill="white" font-size="9" font-weight="600">Starbucks</text>
  <text x="517" y="359" fill="#6B7280" font-size="7">Mon, Dec 9</text>
  <text x="652" y="354" fill="#FF1E41" font-size="9" font-weight="700" text-anchor="end">−$6.50</text>

  <!-- Stripe badge -->
  <rect x="484" y="370" width="168" height="42" rx="10" fill="#1E2A3A" stroke="#2A3448" stroke-width="1"/>
  <text x="568" y="386" fill="#6B7280" font-size="7" text-anchor="middle">POWERED BY</text>
  <text x="568" y="401" fill="white" font-size="11" font-weight="800" text-anchor="middle">stripe</text>

  <!-- Nav bar -->
  <rect x="476" y="406" width="184" height="16" rx="0" fill="#0D1117"/>
  <text x="508" y="418" fill="#FF1E41" font-size="9" text-anchor="middle">⊞</text>
  <text x="540" y="418" fill="#374151" font-size="9" text-anchor="middle">↑↓</text>
  <text x="572" y="418" fill="#374151" font-size="9" text-anchor="middle">◎</text>
  <text x="604" y="418" fill="#374151" font-size="9" text-anchor="middle">⚙</text>

  <!-- Second phone (partial, background) -->
  <rect x="390" y="60" width="90" height="180" rx="16" fill="#141824" stroke="#1E2A3A" stroke-width="1" opacity="0.7"/>
  <rect x="396" y="80" width="78" height="152" rx="6" fill="#0D1117" opacity="0.7"/>
  <text x="435" y="108" fill="#FF1E41" font-size="7" text-anchor="middle" opacity="0.7">SEND MONEY</text>
  <rect x="403" y="116" width="64" height="30" rx="8" fill="#1E2A3A" opacity="0.7"/>
  <text x="435" y="135" fill="white" font-size="8" text-anchor="middle" opacity="0.5">$ 1,250.00</text>
  <rect x="403" y="154" width="64" height="20" rx="10" fill="#FF1E41" opacity="0.5"/>
  <text x="435" y="168" fill="white" font-size="7" text-anchor="middle" opacity="0.6">Send via Stripe</text>

  <!-- Bottom label -->
  <text x="60" y="460" fill="#2A3448" font-size="11">SOLYIO · REACT NATIVE · STRIPE CONNECT · APPLE PAY · GOOGLE PAY</text>
</svg>
